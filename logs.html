<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log Aktivitas - UNA POS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="overflow-hidden" style="background:#F6F1E9; color:#3D2B00;">
    <div class="flex h-screen w-full">
        <aside id="main-sidebar" class="w-64 flex-shrink-0 flex flex-col transition-all duration-300 relative" style="background:#1C1A16; min-width:72px;"></aside>
        
        <main class="flex-1 flex flex-col overflow-hidden">
            <div class="h-full p-8 overflow-y-auto">
                <div class="max-w-6xl mx-auto">
                    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mb-8">
                        <div>
                            <h1 class="text-2xl font-black tracking-tight" style="color:#1C1A16;">Log Aktivitas</h1>
                            <p class="text-sm font-medium" style="color:#A05C00;">Jejak riwayat tindakan seluruh pengguna sistem</p>
                        </div>
                        <div class="flex flex-wrap gap-2 w-full md:w-auto">
                            <div class="relative flex-1 md:flex-none md:min-w-[240px]">
                                <i data-lucide="search" class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2" style="color:#A05C0066;"></i>
                                <input type="text" id="log-search" placeholder="Cari aktivitas atau user..." class="una-input w-full pl-10 text-xs">
                            </div>
                            <button onclick="clearLogs()" class="px-5 py-2.5 rounded-xl transition-all shadow-md bg-red-600 text-white flex items-center gap-2 text-xs font-black hover:bg-red-700 hover:scale-105 active:scale-95"><i data-lucide="trash-2" class="w-4 h-4"></i> Hapus Semua Log</button>
                        </div>
                    </div>

                    <div class="rounded-3xl overflow-hidden shadow-sm" style="background:#FFFDF8; border:1.5px solid rgba(255,154,0,0.15);">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr style="background:#FFF4DC;">
                                    <th class="px-8 py-5 font-black text-[10px] uppercase tracking-widest text-[#A05C00]">Waktu</th>
                                    <th class="px-8 py-5 font-black text-[10px] uppercase tracking-widest text-[#A05C00]">User</th>
                                    <th class="px-8 py-5 font-black text-[10px] uppercase tracking-widest text-[#A05C00]">Tindakan</th>
                                    <th class="px-8 py-5 font-black text-[10px] uppercase tracking-widest text-[#A05C00]">Detail / Objek</th>
                                </tr>
                            </thead>
                            <tbody id="log-table-body" class="divide-y text-sm font-bold"></tbody>
                        </table>
                    <div id="log-pagination" class="mt-6 flex flex-col md:flex-row justify-between items-center gap-4 px-2">
                        <div class="text-xs font-bold" style="color:#A05C0066;">Menampilkan <span id="log-range" class="text-[#A05C00]">0 - 0</span> dari <span id="log-total" class="text-[#A05C00]">0</span> riwayat</div>
                        <div class="flex items-center gap-2" id="log-page-controls"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/app.js"></script>
    <script>
        window.onload = () => {
            loadState();
            injectSidebar('logs');
            renderLogs();
            
            const searchInput = document.getElementById('log-search');
            if (searchInput) {
                searchInput.addEventListener('input', () => {
                    state.logPage = 1;
                    renderLogs();
                });
            }
        };

        function renderLogs() {
            const tbody = document.getElementById('log-table-body');
            if (!tbody) return;
            
            const search = document.getElementById('log-search')?.value.toLowerCase() || '';
            const filtered = state.logs.filter(l => 
                l.user.toLowerCase().includes(search) || 
                l.action.toLowerCase().includes(search) || 
                l.detail.toLowerCase().includes(search)
            );

            const totalLogs = filtered.length;
            const totalPages = Math.ceil(totalLogs / state.logItemsPerPage);
            const start = (state.logPage - 1) * state.logItemsPerPage;
            const paginated = filtered.slice(start, start + state.logItemsPerPage);
            
            if (document.getElementById('log-total')) document.getElementById('log-total').innerText = totalLogs;
            if (document.getElementById('log-range')) document.getElementById('log-range').innerText = `${totalLogs === 0 ? 0 : start + 1} - ${Math.min(start + state.logItemsPerPage, totalLogs)}`;
            
            tbody.innerHTML = paginated.map(l => `
                <tr class="hover:bg-gray-50/50 transition-colors">
                    <td class="px-8 py-5 text-gray-400 text-[10px] font-black uppercase tracking-tighter w-40">${l.date}</td>
                    <td class="px-8 py-5"><div class="flex items-center gap-2"><div class="w-2 h-2 rounded-full bg-orange-200"></div><span class="text-orange-900 font-black text-xs">${l.user}</span></div></td>
                    <td class="px-8 py-5"><span class="px-3 py-1 rounded-lg bg-orange-50 text-orange-600 text-[9px] font-black uppercase tracking-tight border border-orange-100">${l.action}</span></td>
                    <td class="px-8 py-5 text-gray-500 italic font-medium text-xs">${l.detail}</td>
                </tr>
            `).join('') || '<tr><td colspan="4" class="p-20 text-center opacity-30 italic font-black">Data log tidak ditemukan</td></tr>';
            
            renderPagination('log-page-controls', state.logPage, totalPages, p => {
                state.logPage = p;
                renderLogs();
            });
            
            if (window.lucide) lucide.createIcons();
        }

        function clearLogs() {
            if (confirm('Bersihkan seluruh log aktivitas? Tindakan ini tidak bisa dibatalkan.')) {
                state.logs = [];
                state.logPage = 1;
                saveState();
                renderLogs();
                showNotification('Seluruh log dihapus');
            }
        }
    </script>
</body>
</html>
