<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manajemen Produk - UNA POS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="overflow-hidden" style="background:#F6F1E9; color:#3D2B00;">
    <div class="flex h-screen w-full">
        <aside id="main-sidebar" class="w-64 flex-shrink-0 flex flex-col transition-all duration-300 relative" style="background:#1C1A16; min-width:72px;"></aside>
        
        <main class="flex-1 flex flex-col overflow-hidden">
            <div class="h-full p-8 overflow-y-auto">
                <div class="max-w-6xl mx-auto">
                    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mb-8">
                        <div>
                            <h1 class="text-2xl font-black tracking-tight" style="color:#1C1A16;">Manajemen Produk</h1>
                            <p class="text-sm font-medium" style="color:#A05C00;">Sisa stok barang di gudang & etalase</p>
                        </div>
                        <div class="flex flex-wrap gap-2 w-full md:w-auto">
                            <div class="relative flex-1 md:flex-none md:min-w-[200px]">
                                <i data-lucide="search" class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2" style="color:#A05C0066;"></i>
                                <input type="text" id="inventory-search" placeholder="Cari SKU atau Nama..." class="una-input w-full pl-10 text-xs">
                            </div>
                            <select id="inventory-category" class="una-input text-xs font-bold" style="min-width:140px;">
                                <option value="Semua">Semua Kategori</option>
                            </select>
                            <select id="inventory-status-filter" class="una-input text-xs font-bold" style="min-width:140px;">
                                <option value="">Semua Status</option>
                                <option value="tersedia">Tersedia</option>
                                <option value="hampir_habis">Menipis</option>
                                <option value="habis_terjual">Habis</option>
                            </select>
                            <button onclick="exportToExcel('inventory')" class="btn-export px-4 py-2.5 rounded-xl transition-all shadow-md flex items-center gap-2 text-xs font-black bg-green-600 text-white hover:bg-green-700">
                                <i data-lucide="download" class="w-4 h-4"></i> Export Data
                            </button>
                            <button onclick="openAddProductModal()" class="btn-primary px-4 py-2.5 rounded-xl text-sm flex items-center gap-2 whitespace-nowrap"><i data-lucide="plus" class="w-4 h-4"></i> Produk Baru</button>
                        </div>
                    </div>
                    
                    <div class="rounded-3xl overflow-hidden shadow-sm" style="background:#FFFDF8; border:1.5px solid rgba(255,154,0,0.15);">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr style="background:#FFF4DC;">
                                    <th class="px-5 py-4 font-black text-[10px] uppercase tracking-widest" style="color:#A05C00;">Produk</th>
                                    <th class="px-5 py-4 font-black text-[10px] uppercase tracking-widest" style="color:#A05C00;">Kategori</th>
                                    <th class="px-5 py-4 font-black text-[10px] uppercase tracking-widest text-right" style="color:#A05C00;">Harga Satuan</th>
                                    <th class="px-5 py-4 font-black text-[10px] uppercase tracking-widest text-center" style="color:#A05C00;">Stok</th>
                                    <th class="px-5 py-4 font-black text-[10px] uppercase tracking-widest" style="color:#A05C00;">Status</th>
                                    <th class="px-5 py-4 font-black text-[10px] uppercase tracking-widest text-center" style="color:#A05C00;">Aksi</th>
                                </tr>
                            </thead>
                            <tbody id="inventory-table-body" class="divide-y text-sm font-medium"></tbody>
                        </table>
                    </div>
                    
                    <div id="inventory-pagination" class="mt-6 flex flex-col md:flex-row justify-between items-center gap-4 px-2">
                        <div class="text-xs font-bold" style="color:#A05C0066;">Menampilkan <span id="inv-range" class="text-[#A05C00]">0 - 0</span> dari <span id="inv-total" class="text-[#A05C00]">0</span> produk</div>
                        <div class="flex items-center gap-2" id="inv-page-controls"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modals -->
    <div id="add-product-modal" class="fixed inset-0 z-[80] bg-black/60 hidden flex items-center justify-center backdrop-blur-sm opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-3xl w-full max-w-lg p-8 shadow-2xl transform scale-95 transition-transform duration-300" id="add-product-modal-content">
            <h2 class="text-xl font-black mb-6 flex items-center gap-2">Tambah Produk</h2>
            <div class="space-y-4">
                <div><label class="block text-xs font-bold mb-1.5 uppercase tracking-widest text-gray-400">Nama Produk</label><input type="text" id="new-prod-name" placeholder="Masukkan nama produk..." class="una-input w-full"></div>
                <div class="grid grid-cols-2 gap-4" id="prod-info-grid">
                    <div><label class="block text-xs font-bold mb-1.5 uppercase tracking-widest text-gray-400">Kategori</label><select id="new-prod-category" class="una-input w-full"></select></div>
                    <div id="stock-input-container"><label class="block text-xs font-bold mb-1.5 uppercase tracking-widest text-gray-400">Stok Awal</label><input type="number" id="new-prod-stock" placeholder="0" class="una-input w-full"></div>
                </div>
                <div><label class="block text-xs font-bold mb-1.5 uppercase tracking-widest text-gray-400">Harga Jual (Rp)</label><input type="text" id="new-prod-price" placeholder="0" class="una-input w-full font-black text-lg text-orange-500"></div>
            </div>
            <div class="mt-8 flex gap-3"><button onclick="closeAddProductModal()" class="flex-1 py-3 font-bold text-gray-400">Batal</button><button onclick="saveNewProduct()" class="btn-primary flex-[2] py-3 rounded-xl">Simpan Produk</button></div>
        </div>
    </div>

    <div id="stock-modal" class="fixed inset-0 z-[80] bg-black/60 hidden flex items-center justify-center backdrop-blur-sm opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-3xl w-full max-w-sm p-8 shadow-2xl transform scale-95 transition-transform duration-300" id="stock-modal-content">
            <h2 class="text-xl font-black mb-1 flex items-center gap-2">Update Stok</h2>
            <p class="text-xs text-gray-400 mb-6" id="stock-prod-name"></p>
            <input type="hidden" id="stock-prod-id">
            <div class="space-y-4">
                <div><label class="block text-xs font-bold mb-1.5 uppercase tracking-widest text-gray-400">Stok Saat Ini</label><input type="number" id="stock-prod-value" class="una-input w-full font-black text-xl"></div>
                <div><label class="block text-xs font-bold mb-1.5 uppercase tracking-widest text-gray-400">Keterangan</label><input type="text" id="stock-note" placeholder="Alasan perubahan..." class="una-input w-full"></div>
                <div class="pt-4 grid grid-cols-2 gap-3 border-t border-dashed border-gray-100">
                    <div><label class="block text-[10px] font-black uppercase text-gray-400">ID Kasir</label><input type="text" id="stock-auth-id" class="una-input w-full text-xs"></div>
                    <div><label class="block text-[10px] font-black uppercase text-gray-400">Sandi</label><input type="password" id="stock-auth-pass" class="una-input w-full text-xs"></div>
                </div>
            </div>
            <div class="mt-8 flex gap-3"><button onclick="closeStockModal()" class="flex-1 py-3 font-bold text-gray-400">Batal</button><button onclick="saveStock()" class="btn-primary flex-[2] py-3 rounded-xl">Simpan</button></div>
        </div>
    </div>

    <div id="discount-modal" class="fixed inset-0 z-[80] bg-black/60 hidden flex items-center justify-center backdrop-blur-sm opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-3xl w-full max-w-sm p-8 shadow-2xl transform scale-95 transition-transform duration-300" id="discount-modal-content">
            <h2 class="text-xl font-black mb-1">Set Diskon</h2>
            <p class="text-xs text-gray-400 mb-6" id="disc-prod-name"></p>
            <input type="hidden" id="disc-prod-id">
            <div><label class="block text-xs font-bold mb-1.5 uppercase tracking-widest text-gray-400">Persentase Diskon (%)</label><input type="number" id="disc-prod-value" min="0" max="100" class="una-input w-full font-black text-2xl text-center text-orange-500"></div>
            <div class="mt-8 flex gap-3"><button onclick="closeDiscountModal()" class="flex-1 py-3 font-bold text-gray-400">Batal</button><button onclick="saveDiscount()" class="btn-primary flex-[2] py-3 rounded-xl">Terapkan</button></div>
        </div>
    </div>

    <div id="edit-product-modal" class="fixed inset-0 z-[80] bg-black/60 hidden flex items-center justify-center backdrop-blur-sm opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-3xl w-full max-w-sm p-8 shadow-2xl transform scale-95 transition-transform duration-300" id="edit-product-modal-content">
            <h2 class="text-xl font-black mb-6">Edit Produk</h2>
            <input type="hidden" id="edit-prod-id">
            <div class="space-y-4">
                <div><label class="block text-xs font-bold mb-1.5 uppercase text-gray-400">Nama Produk</label><input type="text" id="edit-prod-name" class="una-input w-full"></div>
                <div>
                    <label class="block text-xs font-bold mb-1.5 uppercase text-gray-400">Kategori</label>
                    <select id="edit-prod-category" class="una-input w-full">
                        <option value="Pakaian">Pakaian</option>
                        <option value="Gamis">Gamis</option>
                        <option value="Dress">Dress</option>
                        <option value="Atasan">Atasan</option>
                        <option value="Mukenah">Mukenah</option>
                        <option value="Tas">Tas</option>
                        <option value="Sandal">Sandal</option>
                        <option value="Sepatu">Sepatu</option>
                        <option value="Make Up">Make Up</option>
                    </select>
                </div>
                <div><label class="block text-xs font-bold mb-1.5 uppercase text-gray-400">Harga Jual</label><input type="text" id="edit-prod-price" class="una-input w-full font-black"></div>
            </div>
            <div class="mt-8 flex gap-3"><button onclick="closeEditProductModal()" class="flex-1 py-3 font-bold text-gray-400">Batal</button><button onclick="saveEditProduct()" class="btn-primary flex-[2] py-3 rounded-xl">Update</button></div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            loadState();
            injectSidebar('inventory');
            renderCategoryOptions();
            renderInventory();
            
            const searchInput = document.getElementById('inventory-search');
            if (searchInput) searchInput.addEventListener('input', () => { state.inventoryPage = 1; renderInventory(); });
            const catFilter = document.getElementById('inventory-category');
            if (catFilter) catFilter.addEventListener('change', () => { state.inventoryPage = 1; renderInventory(); });
            const statusFilter = document.getElementById('inventory-status-filter');
            if (statusFilter) statusFilter.addEventListener('change', () => { state.inventoryPage = 1; renderInventory(); });
            
            const priceInputs = ['new-prod-price', 'edit-prod-price'];
            priceInputs.forEach(id => {
                const el = document.getElementById(id);
                if (el) {
                    el.addEventListener('input', (e) => {
                        let value = e.target.value.replace(/\D/g, '');
                        e.target.value = value ? new Intl.NumberFormat('id-ID').format(value) : '';
                    });
                }
            });
        });
    </script>
</body>
</html>
