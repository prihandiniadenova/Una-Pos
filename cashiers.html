<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manajemen Kasir - UNA POS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="overflow-hidden" style="background:#F6F1E9; color:#3D2B00;">
    <div class="flex h-screen w-full">
        <aside id="main-sidebar" class="w-60 flex flex-col transition-all duration-300 relative" style="background:#1C1A16; min-width:72px;"></aside>
        
        <main class="flex-1 flex flex-col overflow-hidden">
            <div class="h-full p-8 overflow-y-auto">
                <div class="max-w-4xl mx-auto">
                    <div class="flex justify-between items-center mb-10">
                        <div>
                            <h1 class="text-2xl font-black tracking-tight" style="color:#1C1A16;">Akses Kasir</h1>
                            <p class="text-sm font-medium" style="color:#A05C00;">Kelola akun petugas kasir & hak akses</p>
                        </div>
                        <button onclick="openAddCashierModal()" class="btn-primary px-6 py-2.5 rounded-xl text-sm font-black flex items-center gap-2 shadow-lg shadow-orange-500/20"><i data-lucide="user-plus" class="w-4 h-4"></i> Akun Baru</button>
                    </div>

                    <div class="rounded-3xl overflow-hidden shadow-sm" style="background:#FFFDF8; border:1.5px solid rgba(255,154,0,0.15);">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr style="background:#FFF4DC;">
                                    <th class="p-5 font-black text-[10px] uppercase tracking-widest text-slate-400">ID Kasir</th>
                                    <th class="p-5 font-black text-[10px] uppercase tracking-widest" style="color:#A05C00;">Nama Petugas</th>
                                    <th class="p-5 font-black text-[10px] uppercase tracking-widest text-center" style="color:#A05C00;">Tgl Bergabung</th>
                                    <th class="p-5 font-black text-[10px] uppercase tracking-widest text-center" style="color:#A05C00;">Aksi</th>
                                </tr>
                            </thead>
                            <tbody id="cashier-table-body" class="divide-y text-sm"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal -->
    <div id="add-cashier-modal" class="fixed inset-0 z-[80] bg-black/60 hidden flex items-center justify-center backdrop-blur-sm opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-[2.5rem] w-full max-w-sm p-10 shadow-2xl transform scale-95 transition-transform duration-300" id="add-cashier-modal-content">
            <h2 id="modal-cashier-title" class="text-xl font-black mb-8 flex items-center gap-3">Akses Kasir Baru</h2>
            <div class="space-y-5">
                <div><label class="block text-xs font-black uppercase text-gray-400 mb-2">Nama Lengkap</label><input type="text" id="new-cashier-name" placeholder="Nama petugas..." class="una-input w-full"></div>
                <div><label class="block text-xs font-black uppercase text-gray-400 mb-2">ID Login</label><input type="text" id="new-cashier-id" placeholder="id_petugas" class="una-input w-full"></div>
                <div><label class="block text-xs font-black uppercase text-gray-400 mb-2">Sandi / Password</label><input type="password" id="new-cashier-pass" placeholder="••••••••" class="una-input w-full"></div>
            </div>
            <div class="mt-10 flex gap-4"><button onclick="closeAddCashierModal()" class="flex-1 py-4 font-black text-gray-400 text-sm">Batal</button><button onclick="saveNewCashier()" class="btn-primary flex-[2] py-4 rounded-2xl font-black text-sm shadow-xl shadow-orange-500/30" id="modal-cashier-btn-text">Simpan Akses</button></div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        window.onload = () => {
            loadState();
            injectSidebar('cashiers');
            renderCashiers();
        };
    </script>
</body>
</html>
