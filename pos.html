<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kasir (POS) - UNA POS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .pos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 1rem;
        }
    </style>
</head>

<body class="overflow-hidden" style="background:#F6F1E9; color:#3D2B00;">
    <div class="flex h-screen w-full">
        <!-- Sidebar removed for POS focus -->

        <main class="flex-1 flex overflow-hidden">
            <!-- Left: Products -->
            <div class="flex-1 flex flex-col h-full overflow-hidden border-r border-gray-200/50">
                <div class="p-6 pb-2">
                    <div class="mb-4 flex items-center justify-between">
                    <div class="flex items-center gap-4">
                        <a href="index.html" class="p-3 bg-white rounded-2xl shadow-sm hover:bg-orange-50 transition-all text-orange-900"><i data-lucide="arrow-left" class="w-5 h-5"></i></a>
                        <div class="relative w-72">
                            <i data-lucide="search"
                                class="w-4 h-4 absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                            <input type="text" id="pos-search" placeholder="Cari Produk atau SKU..."
                                class="una-input w-full pl-12 h-12 text-sm shadow-sm">
                        </div>
                        <div class="flex items-center gap-3 overflow-hidden" id="pos-category-container">
                            <div class="flex gap-1.5" id="pos-cat-chips"></div>
                            <div class="h-6 w-px bg-gray-200 mx-1"></div>
                            <select id="pos-cat-select" class="una-input h-10 text-xs px-4 pr-10 shadow-sm border-0 min-w-[140px]" onchange="setPOSCategory(this.value)">
                                <option value="Semua">Lainnya...</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>
            <div class="flex-1 overflow-y-auto px-6 pb-20">
                <div id="pos-grid" class="pos-grid"></div>
            </div>
        </div>

            <!-- Right: Cart -->
            <div class="w-96 flex flex-col h-full bg-white shadow-2xl relative z-10">
                <div class="p-6 border-b border-gray-50 bg-[#FFFDF8]">
                    <h3 class="font-black text-lg flex items-center gap-2 " style="color:#1C1A16;"><i
                            data-lucide="shopping-cart" class="w-5 h-5 text-orange-500"></i> Keranjang</h3>
                    <div class="mt-4">
                        <div class="relative">
                            <i data-lucide="users"
                                class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-gray-300"></i>
                            <input type="text" list="member-list" id="member-search-input" onchange="selectMember()"
                                placeholder="Cari Member..." class="una-input w-full pl-9 h-10 text-xs">
                            <datalist id="member-list"></datalist>
                        </div>
                        <div id="selected-member-badge"
                            class="hidden mt-2 inline-block px-3 py-1 rounded-full bg-orange-100 text-[#A05C00] text-[10px] font-black uppercase tracking-widest border border-orange-200 animate-pop">
                        </div>
                    </div>
                </div>

                <div id="cart-items" class="flex-1 overflow-y-auto p-6 space-y-3"></div>

                <div class="p-6 bg-white border-t space-y-4 shadow-[0_-10px_30px_rgba(0,0,0,0.02)]">
                    <div class="flex justify-between items-center text-xs font-bold text-gray-400">
                        <span>Subtotal</span>
                        <span id="cart-subtotal">Rp 0</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-xs font-black uppercase tracking-widest" style="color:#1C1A16;">Total
                            Pembayaran</span>
                        <span id="cart-total" class="text-2xl font-black text-orange-500">Rp 0</span>
                    </div>
                    <button onclick="checkout()"
                        class="btn-primary w-full py-4 rounded-2xl font-black text-lg shadow-xl shadow-orange-500/20 active:scale-95 transition-all">Bayar
                        Sekarang (F8)</button>
                </div>
            </div>
        </main>
    </div>

    <script src="js/app.js"></script>
    <script src="js/pos.js"></script>
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            loadState();
            injectSidebar('pos');

            // Fill member list
            const datalist = document.getElementById('member-list');
            if (datalist && state.members) {
                datalist.innerHTML = state.members.map(m => `<option value="${m.name} (${m.phone})">`).join('');
            }

            renderPOSCategories();
            renderPOS();
            updateCartUI();

            const searchInput = document.getElementById('pos-search');
            if (searchInput) searchInput.addEventListener('input', renderPOS);

            // Shortcuts
            window.addEventListener('keydown', (e) => {
                if (e.key === 'F8') checkout();
            });
        });
    </script>
    <div id="payment-modal" class="fixed inset-0 z-[100] bg-black/60 hidden flex items-center justify-center backdrop-blur-sm opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-[2.5rem] w-full max-w-md p-10 shadow-2xl transform scale-95 transition-all duration-300" id="payment-modal-content">
            <h2 class="text-2xl font-black mb-1 text-center" style="color:#1C1A16;">Pilih Pembayaran</h2>
            <p class="text-center text-xs font-bold text-gray-400 mb-8" id="pay-total-display"></p>
            
            <div class="grid grid-cols-1 gap-3">
                <button onclick="processPayment('Tunai')" class="flex items-center gap-4 p-5 rounded-2xl border-2 border-transparent bg-gray-50 hover:bg-orange-50 hover:border-orange-500 transition-all group">
                    <div class="w-12 h-12 rounded-xl bg-white shadow-sm flex items-center justify-center text-green-600 group-hover:scale-110 transition-transform"><i data-lucide="banknote" class="w-6 h-6"></i></div>
                    <div class="text-left"><p class="font-black text-sm">Tunai / Cash</p><p class="text-[10px] font-bold text-gray-400">Pembayaran langsung uang kertas</p></div>
                </button>
                <button onclick="processPayment('QRIS')" class="flex items-center gap-4 p-5 rounded-2xl border-2 border-transparent bg-gray-50 hover:bg-orange-50 hover:border-orange-500 transition-all group">
                    <div class="w-12 h-12 rounded-xl bg-white shadow-sm flex items-center justify-center text-purple-600 group-hover:scale-110 transition-transform"><i data-lucide="qr-code" class="w-6 h-6"></i></div>
                    <div class="text-left"><p class="font-black text-sm">QRIS / E-Wallet</p><p class="text-[10px] font-bold text-gray-400">Scan QR via m-banking/e-wallet</p></div>
                </button>
                <button onclick="processPayment('Debit')" class="flex items-center gap-4 p-5 rounded-2xl border-2 border-transparent bg-gray-50 hover:bg-orange-50 hover:border-orange-500 transition-all group">
                    <div class="w-12 h-12 rounded-xl bg-white shadow-sm flex items-center justify-center text-blue-600 group-hover:scale-110 transition-transform"><i data-lucide="credit-card" class="w-6 h-6"></i></div>
                    <div class="text-left"><p class="font-black text-sm">Debit / Kredit</p><p class="text-[10px] font-bold text-gray-400">Mesin EDC kartu bank</p></div>
                </button>
            </div>
            
            <button onclick="closePaymentModal()" class="w-full mt-6 py-4 font-black text-gray-400 text-sm">Batal / Kembali</button>
        </div>
    </div>

</body>

</html>
