<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kasir (POS) - UNA POS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .pos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 1rem;
        }
    </style>
</head>

<body class="overflow-hidden" style="background:#F6F1E9; color:#3D2B00;">
    <div class="flex h-screen w-full">
        <!-- Sidebar removed for POS focus -->

        <main class="flex-1 flex overflow-hidden">
            <!-- Left: Products -->
            <div class="flex-1 flex flex-col h-full overflow-hidden border-r border-gray-200/50">
                <div class="p-6 pb-2">
                    <div class="mb-4 flex items-center justify-between">
                    <div class="flex items-center gap-4">
                        <a href="index.html" class="p-3 bg-white rounded-2xl shadow-sm hover:bg-orange-50 transition-all text-orange-900"><i data-lucide="arrow-left" class="w-5 h-5"></i></a>
                        <div class="relative w-72">
                            <i data-lucide="search"
                                class="w-4 h-4 absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                            <input type="text" id="pos-search" placeholder="Cari Produk atau SKU..."
                                class="una-input w-full pl-12 h-12 text-sm shadow-sm">
                        </div>
                        <div class="relative min-w-[180px]">
                            <i data-lucide="filter" class="w-3.5 h-3.5 absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                            <input type="text" id="pos-cat-input" list="pos-cat-list" placeholder="Filter Kategori..." class="una-input w-full pl-9 h-11 text-xs shadow-sm bg-gray-50/50 border-0" onchange="setPOSCategory(this.value)">
                            <datalist id="pos-cat-list"></datalist>
                        </div>
                        <div class="flex items-center gap-4 border-l border-gray-100 pl-4 ml-2">
                            <div id="shift-status-ui" class="hidden text-right pr-2">
                                <p class="text-[9px] font-black uppercase text-gray-400">Shift Aktif</p>
                                <p id="shift-user-display" class="text-xs font-black text-orange-900"></p>
                            </div>
                            <button onclick="openCloseShiftModal()" id="btn-close-shift" class="hidden px-5 py-3 rounded-2xl bg-red-600 text-white font-black text-xs shadow-lg shadow-red-600/20 flex items-center gap-2 hover:bg-red-700 transition-all active:scale-95"><i data-lucide="power" class="w-4 h-4"></i> Tutup Kasir</button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="flex-1 overflow-y-auto px-6 pb-20">
                <div id="pos-grid" class="pos-grid"></div>
            </div>
        </div>

            <!-- Right: Cart -->
            <div class="w-96 flex flex-col h-full bg-white shadow-2xl relative z-10">
                <div class="p-6 border-b border-gray-50 bg-[#FFFDF8]">
                    <h3 class="font-black text-lg flex items-center gap-2 " style="color:#1C1A16;"><i
                            data-lucide="shopping-cart" class="w-5 h-5 text-orange-500"></i> Keranjang</h3>
                    <div class="mt-4">
                        <div class="relative">
                            <i data-lucide="users"
                                class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-gray-300"></i>
                            <input type="text" list="member-list" id="member-search-input" onchange="selectMember()"
                                placeholder="Cari Member..." class="una-input w-full pl-9 h-10 text-xs">
                            <datalist id="member-list"></datalist>
                        </div>
                        <div id="selected-member-badge"
                            class="hidden mt-2 inline-block px-3 py-1 rounded-full bg-orange-100 text-[#A05C00] text-[10px] font-black uppercase tracking-widest border border-orange-200 animate-pop">
                        </div>
                    </div>
                </div>

                <div id="cart-items" class="flex-1 overflow-y-auto p-6 space-y-3"></div>

                <div class="p-6 bg-white border-t space-y-4 shadow-[0_-10px_30px_rgba(0,0,0,0.02)]">
                    <div class="flex justify-between items-center text-xs font-bold text-gray-400">
                        <span>Subtotal</span>
                        <span id="cart-subtotal">Rp 0</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-xs font-black uppercase tracking-widest" style="color:#1C1A16;">Total
                            Pembayaran</span>
                        <span id="cart-total" class="text-2xl font-black text-orange-500">Rp 0</span>
                    </div>
                    <button onclick="checkout()"
                        class="btn-primary w-full py-4 rounded-2xl font-black text-lg shadow-xl shadow-orange-500/20 active:scale-95 transition-all">Bayar
                        Sekarang (F8)</button>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal Buka Shift (Buka Kasir) -->
    <div id="open-shift-modal" class="fixed inset-0 z-[100] bg-black/60 hidden flex items-center justify-center backdrop-blur-md opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-[2.5rem] w-full max-w-md p-10 shadow-2xl transform scale-95 transition-transform duration-300" id="open-shift-modal-content">
            <div class="text-center mb-8">
                <div class="w-20 h-20 bg-orange-100 text-orange-500 rounded-[2rem] flex items-center justify-center mx-auto mb-4 shadow-inner"><i data-lucide="store" class="w-10 h-10"></i></div>
                <h2 class="text-2xl font-black">Buka Shift Kasir</h2>
                <p class="text-sm font-medium text-gray-400">Siapkan modal awal untuk transaksi hari ini</p>
            </div>
            
            <div class="space-y-6">
                <div>
                    <label class="block text-[10px] font-black uppercase text-gray-400 mb-2 ml-1">Otorisasi Kasir</label>
                    <div class="grid grid-cols-2 gap-3">
                        <input type="text" id="shift-open-id" placeholder="ID Kasir" class="una-input w-full text-xs py-4 px-4">
                        <input type="password" id="shift-open-pass" placeholder="Sandi" class="una-input w-full text-xs py-4 px-4">
                    </div>
                </div>
                <div>
                    <label class="block text-[10px] font-black uppercase text-gray-400 mb-2 ml-1">Uang Modal (Buka Kasir)</label>
                    <input type="text" id="shift-open-balance" placeholder="Rp 0" class="una-input w-full py-5 px-6 font-black text-2xl text-orange-600">
                </div>
            </div>

            <div class="mt-10 flex gap-4">
                <a href="index.html" class="flex-1 py-4 font-black text-gray-400 text-center">Kembali</a>
                <button onclick="processOpenShift()" class="btn-primary flex-[2] py-4 rounded-2xl font-black shadow-lg shadow-orange-500/20">Buka Kasir Sekarang</button>
            </div>
        </div>
    </div>

    <!-- Modal Tutup Shift -->
    <div id="close-shift-modal" class="fixed inset-0 z-[100] bg-black/60 hidden flex items-center justify-center backdrop-blur-md opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-[2.5rem] w-full max-w-md p-10 shadow-2xl transform scale-95 transition-transform duration-300" id="close-shift-modal-content">
            <h2 class="text-2xl font-black mb-1">Tutup Kasir</h2>
            <p class="text-xs text-gray-400 mb-8 italic">Ringkasan penjualan shift ini</p>
            
            <div class="space-y-4 mb-8">
                <div class="p-5 bg-gray-50 rounded-3xl flex justify-between items-center">
                    <span class="text-xs font-bold text-gray-500 uppercase">Modal Awal</span>
                    <span class="font-black" id="cs-opening">Rp 0</span>
                </div>
                <div class="p-5 bg-orange-50 rounded-3xl flex justify-between items-center">
                    <span class="text-xs font-bold text-orange-900 uppercase">Total Penjualan</span>
                    <span class="font-black text-orange-600" id="cs-sales">Rp 0</span>
                </div>
                <div class="p-5 bg-green-50 border-2 border-green-500/10 rounded-3xl flex justify-between items-center">
                    <span class="text-xs font-black text-green-700 uppercase">Total Uang Laci</span>
                    <span class="text-xl font-black text-green-600" id="cs-total">Rp 0</span>
                </div>
            </div>

            <div class="flex gap-4">
                <button onclick="closeCloseShiftModal()" class="flex-1 py-4 font-black text-gray-400">Batal</button>
                <button onclick="processCloseShift()" class="bg-red-600 text-white flex-[2] py-4 rounded-2xl font-black shadow-lg shadow-red-600/20">Akhiri Shift & Tutup</button>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script src="js/pos.js"></script>
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            loadState();
            checkShiftStatus();
            injectSidebar('pos');

            // Fill member list
            const datalist = document.getElementById('member-list');
            if (datalist && state.members) {
                datalist.innerHTML = state.members.map(m => `<option value="${m.name} (${m.phone})">`).join('');
            }

            renderPOSCategories();
            renderPOS();
            updateCartUI();

            const searchInput = document.getElementById('pos-search');
            if (searchInput) searchInput.addEventListener('input', renderPOS);

            // Shortcuts
            window.addEventListener('keydown', (e) => {
                if (e.key === 'F8') checkout();
            });
        });
    </script>
    <div id="payment-modal" class="fixed inset-0 z-[100] bg-black/60 hidden flex items-center justify-center backdrop-blur-sm opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-[2.5rem] w-full max-w-md p-10 shadow-2xl transform scale-95 transition-all duration-300" id="payment-modal-content">
            <h2 class="text-2xl font-black mb-1 text-center" style="color:#1C1A16;">Pilih Pembayaran</h2>
            <p class="text-center text-xs font-bold text-gray-400 mb-8" id="pay-total-display"></p>
            
            <div class="grid grid-cols-1 gap-3">
                <button onclick="processPayment('Tunai')" class="flex items-center gap-4 p-5 rounded-2xl border-2 border-transparent bg-gray-50 hover:bg-orange-50 hover:border-orange-500 transition-all group">
                    <div class="w-12 h-12 rounded-xl bg-white shadow-sm flex items-center justify-center text-green-600 group-hover:scale-110 transition-transform"><i data-lucide="banknote" class="w-6 h-6"></i></div>
                    <div class="text-left"><p class="font-black text-sm">Tunai / Cash</p><p class="text-[10px] font-bold text-gray-400">Pembayaran langsung uang kertas</p></div>
                </button>
                <button onclick="processPayment('QRIS')" class="flex items-center gap-4 p-5 rounded-2xl border-2 border-transparent bg-gray-50 hover:bg-orange-50 hover:border-orange-500 transition-all group">
                    <div class="w-12 h-12 rounded-xl bg-white shadow-sm flex items-center justify-center text-purple-600 group-hover:scale-110 transition-transform"><i data-lucide="qr-code" class="w-6 h-6"></i></div>
                    <div class="text-left"><p class="font-black text-sm">QRIS / E-Wallet</p><p class="text-[10px] font-bold text-gray-400">Scan QR via m-banking/e-wallet</p></div>
                </button>
                <button onclick="processPayment('Debit')" class="flex items-center gap-4 p-5 rounded-2xl border-2 border-transparent bg-gray-50 hover:bg-orange-50 hover:border-orange-500 transition-all group">
                    <div class="w-12 h-12 rounded-xl bg-white shadow-sm flex items-center justify-center text-blue-600 group-hover:scale-110 transition-transform"><i data-lucide="credit-card" class="w-6 h-6"></i></div>
                    <div class="text-left"><p class="font-black text-sm">Debit / Kredit</p><p class="text-[10px] font-bold text-gray-400">Mesin EDC kartu bank</p></div>
                </button>
            </div>
            
            <button onclick="closePaymentModal()" class="w-full mt-6 py-4 font-black text-gray-400 text-sm">Batal / Kembali</button>
        </div>
    </div>

</body>

</html>
