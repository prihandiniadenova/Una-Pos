<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manajemen Member - UNA POS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="overflow-hidden" style="background:#F6F1E9; color:#3D2B00;">
    <div class="flex h-screen w-full">
        <aside id="main-sidebar" class="w-64 flex-shrink-0 flex flex-col transition-all duration-300 relative" style="background:#1C1A16; min-width:72px;"></aside>
        
        <main class="flex-1 flex flex-col overflow-hidden">
            <div class="h-full p-8 overflow-y-auto">
                <div class="max-w-6xl mx-auto">
                    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mb-8">
                        <div>
                            <h1 class="text-2xl font-black tracking-tight" style="color:#1C1A16;">Member / Pelanggan</h1>
                            <p class="text-sm font-medium" style="color:#A05C00;">Kelola data pelanggan & poin loyalitas</p>
                        </div>
                        <div class="flex flex-wrap gap-2 w-full md:w-auto">
                            <div class="relative flex-1 md:flex-none md:min-w-[240px]">
                                <i data-lucide="search" class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2" style="color:#A05C0066;"></i>
                                <input type="text" id="member-search" placeholder="Cari Nama, No. HP, atau ID..." class="una-input w-full pl-10 text-xs">
                            </div>
                            <button onclick="exportToExcel('members')" class="btn-export px-4 py-2.5 rounded-xl transition-all shadow-md flex items-center gap-2 text-xs font-black bg-green-600 text-white hover:bg-green-700">
                                <i data-lucide="download" class="w-4 h-4"></i> Export Data
                            </button>
                            <button onclick="openAddMemberModal()" class="btn-primary px-4 py-2.5 rounded-xl text-sm flex items-center gap-2 whitespace-nowrap"><i data-lucide="user-plus" class="w-4 h-4"></i> Member Baru</button>
                        </div>
                    </div>

                    <div class="rounded-3xl overflow-hidden shadow-sm" style="background:#FFFDF8; border:1.5px solid rgba(255,154,0,0.15);">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr style="background:#FFF4DC;">
                                    <th class="px-8 py-5 font-black text-[10px] uppercase tracking-widest text-slate-400">ID Member</th>
                                    <th class="px-8 py-5 font-black text-[10px] uppercase tracking-widest" style="color:#A05C00;">Nama Pelanggan</th>
                                    <th class="px-8 py-5 font-black text-[10px] uppercase tracking-widest text-center" style="color:#A05C00;">WhatsApp</th>
                                    <th class="px-8 py-5 font-black text-[10px] uppercase tracking-widest text-center" style="color:#A05C00;">Loyalty Points</th>
                                    <th class="px-8 py-5 font-black text-[10px] uppercase tracking-widest text-center" style="color:#A05C00;">Tgl Join</th>
                                    <th class="px-8 py-5 font-black text-[10px] uppercase tracking-widest text-center" style="color:#A05C00;">Aksi</th>
                                </tr>
                            </thead>
                            <tbody id="member-table-body" class="divide-y text-sm"></tbody>
                        </table>
                    </div>

                    <div class="mt-6 flex justify-between items-center px-4">
                        <div class="text-xs font-bold" style="color:#A05C0066;">Total: <span id="mem-total" class="text-[#A05C00]">0</span> member</div>
                        <div id="mem-page-controls" class="flex items-center gap-2"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal -->
    <div id="add-member-modal" class="fixed inset-0 z-[80] bg-black/60 hidden flex items-center justify-center backdrop-blur-sm transition-all duration-300">
        <div class="bg-white rounded-[2.5rem] w-full max-w-md p-10 shadow-2xl">
            <h2 class="text-2xl font-black mb-8" style="color:#1C1A16;">Member Baru</h2>
            <div class="space-y-5">
                <div><label class="block text-xs font-black uppercase tracking-widest text-gray-400 mb-2">Nama Lengkap</label><input type="text" id="new-mem-name" class="una-input w-full"></div>
                <div><label class="block text-xs font-black uppercase tracking-widest text-gray-400 mb-2">Nomor WhatsApp</label><input type="text" id="new-mem-phone" class="una-input w-full"></div>
            </div>
            <div class="mt-10 flex gap-4"><button onclick="closeAddMemberModal()" class="flex-1 py-4 font-black">Batal</button><button onclick="saveNewMember()" class="btn-primary flex-[2] py-4 rounded-2xl font-black">Simpan Member</button></div>
        </div>
    </div>

    <div id="edit-member-modal" class="fixed inset-0 z-[80] bg-black/60 hidden flex items-center justify-center backdrop-blur-sm opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-[2.5rem] w-full max-w-md p-10 shadow-2xl">
            <h2 class="text-2xl font-black mb-8" style="color:#1C1A16;">Edit Member</h2>
            <input type="hidden" id="edit-mem-id">
            <div class="space-y-5">
                <div><label class="block text-xs font-black uppercase tracking-widest text-gray-400 mb-2">Nama Lengkap</label><input type="text" id="edit-mem-name" class="una-input w-full"></div>
                <div><label class="block text-xs font-black uppercase tracking-widest text-gray-400 mb-2">Nomor WhatsApp</label><input type="text" id="edit-mem-phone" class="una-input w-full"></div>
            </div>
            <div class="mt-10 flex gap-4"><button onclick="closeEditMemberModal()" class="flex-1 py-4 font-black">Batal</button><button onclick="saveEditMember()" class="btn-primary flex-[2] py-4 rounded-2xl font-black">Update Data</button></div>
        </div>
    </div>

    <div id="point-info-modal" class="fixed inset-0 z-[100] bg-black/60 hidden flex items-center justify-center backdrop-blur-md opacity-0 transition-all duration-500">
        <div class="bg-white rounded-[3rem] w-full max-w-lg overflow-hidden shadow-2xl transform scale-95 transition-all duration-500" id="point-info-modal-content">
            <div class="bg-[#1C1A16] p-10 text-white relative">
                <div class="absolute top-0 right-0 w-32 h-32 bg-orange-500/10 rounded-full -mr-16 -mt-16 blur-3xl"></div>
                <p class="text-[10px] font-black uppercase tracking-[0.3em] text-orange-500 mb-2">Loyalty Reward</p>
                <h2 class="text-3xl font-black mb-1" id="point-info-mem-name">Member Name</h2>
                <p class="text-xs font-bold text-gray-400" id="point-info-mem-id">ID: UNA-MEM-001</p>
                
                <div class="mt-8 flex items-end gap-2">
                    <span class="text-5xl font-black text-orange-500" id="point-info-total-points">0</span>
                    <span class="text-sm font-black text-gray-400 mb-2 uppercase tracking-widest">Points</span>
                </div>
            </div>
            
            <div class="p-10">
                <h3 class="text-xs font-black uppercase tracking-widest text-gray-400 mb-6 flex items-center gap-2">
                    <i data-lucide="history" class="w-4 h-4"></i> Riwayat Perolehan
                </h3>
                <div class="max-h-72 overflow-y-auto space-y-4 pr-3 -mr-3 scroll-custom" id="point-info-list">
                    <!-- Transactions injected here -->
                </div>
                
                <button onclick="closePointInfoModal()" class="w-full mt-10 py-5 rounded-2xl font-black text-sm bg-gray-50 hover:bg-gray-100 transition-all border border-gray-100">Tutup Rincian</button>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            loadState();
            injectSidebar('members');
            renderMembers();
            const search = document.getElementById('member-search');
            if (search) search.addEventListener('input', () => { state.memberPage = 1; renderMembers(); });
        });
    </script>
</body>
</html>
