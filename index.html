<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - UNA POS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="overflow-hidden" style="background:#F6F1E9; color:#3D2B00;">
    <div class="flex h-screen w-full">
        <!-- Sidebar -->
        <aside id="main-sidebar" class="w-64 flex-shrink-0 flex flex-col transition-all duration-300 relative" style="background:#1C1A16; min-width:72px;"></aside>
        
        <!-- Main Content -->
        <main class="flex-1 flex flex-col overflow-hidden">
            <div id="tab-dashboard" class="h-full p-8 overflow-y-auto">
                <div class="max-w-6xl mx-auto">
                    <div class="mb-8 text-center md:text-left">
                        <h1 class="text-3xl font-black tracking-tight" style="color:#1C1A16;">Ringkasan Dashboard</h1>
                        <p class="font-medium" style="color:#A05C00;">Laporan performa toko hari ini</p>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5 mb-8">
                        <div class="p-6 rounded-[2rem] animate-pop" style="background:#FFFDF8; border:1.5px solid rgba(255,154,0,0.15);">
                            <div class="w-12 h-12 rounded-2xl flex items-center justify-center mb-4" style="background:#FFF4DC;"><i data-lucide="banknote" class="w-6 h-6" style="color:#FF9A00;"></i></div>
                            <p class="text-xs font-bold uppercase tracking-widest mb-1" style="color:#C06800;">Omzet Hari Ini</p>
                            <h3 id="dash-revenue" class="text-xl font-black tracking-tight">Rp 0</h3>
                        </div>
                        <div class="p-6 rounded-[2rem] animate-pop" style="background:#FFFDF8; border:1.5px solid rgba(255,154,0,0.15);">
                            <div class="w-12 h-12 rounded-2xl flex items-center justify-center mb-4" style="background:#FFF4DC;"><i data-lucide="shopping-cart" class="w-6 h-6" style="color:#FF9A00;"></i></div>
                            <p class="text-xs font-bold uppercase tracking-widest mb-1" style="color:#C06800;">Transaksi</p>
                            <h3 id="dash-trx-count" class="text-xl font-black tracking-tight">0</h3>
                        </div>
                        <div class="p-6 rounded-[2rem] animate-pop" style="background:#FFFDF8; border:1.5px solid rgba(255,154,0,0.15);">
                            <div class="w-12 h-12 rounded-2xl flex items-center justify-center mb-4" style="background:#FFF4DC;"><i data-lucide="alert-triangle" class="w-6 h-6" style="color:#FF9A00;"></i></div>
                            <p class="text-xs font-bold uppercase tracking-widest mb-1" style="color:#C06800;">Stok Menipis</p>
                            <h3 id="dash-low-stock" class="text-xl font-black tracking-tight">0</h3>
                        </div>
                        <div class="p-6 rounded-[2rem] animate-pop" style="background:#FFFDF8; border:1.5px solid rgba(255,154,0,0.15);">
                            <div class="w-12 h-12 rounded-2xl flex items-center justify-center mb-4" style="background:#FFF4DC;"><i data-lucide="users" class="w-6 h-6" style="color:#FF9A00;"></i></div>
                            <p class="text-xs font-bold uppercase tracking-widest mb-1" style="color:#C06800;">Total Members</p>
                            <h3 id="dash-members" class="text-xl font-black tracking-tight">0</h3>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        <div class="lg:col-span-2">
                             <div class="p-8 rounded-[2.5rem] h-full" style="background:#FFFDF8; border:1.5px solid rgba(255,154,0,0.15);">
                                <div class="flex justify-between items-center mb-8">
                                    <div><h3 class="text-xl font-black" style="color:#1C1A16;">Produk Terlaris</h3><p class="text-xs font-bold" style="color:#A05C0066;">Berdasarkan kuantitas penjualan</p></div>
                                    <div class="p-3 rounded-2xl" style="background:#FFF4DC; color:#FF9A00;"><i data-lucide="trending-up" class="w-5 h-5"></i></div>
                                </div>
                                <div class="space-y-4" id="dash-top-products">
                                    <p class="text-sm italic text-center py-10 opacity-30">Data belum tersedia</p>
                                </div>
                             </div>
                        </div>
                        <div>
                            <div class="p-8 rounded-[2.5rem] h-full" style="background:linear-gradient(180deg, #1C1A16, #2D2A24);">
                                <div class="text-center mb-8">
                                    <div class="w-16 h-16 rounded-3xl flex items-center justify-center mx-auto mb-4" style="background:linear-gradient(135deg, #FF9A00, #FFD93D);"><i data-lucide="calculator" class="w-8 h-8" style="color:#3D2B00;"></i></div>
                                    <h3 class="text-white font-black text-xl">Quick Action</h3>
                                    <p class="text-gray-500 text-xs font-bold uppercase tracking-widest mt-2">Akses Cepat Menu Utama</p>
                                </div>
                                <div class="grid grid-cols-1 gap-3">
                                    <a href="pos.html" class="flex items-center gap-4 p-4 rounded-2xl bg-white/5 hover:bg-white/10 transition-all border border-white/5 group">
                                        <div class="w-10 h-10 rounded-xl flex items-center justify-center bg-orange-500/20 text-orange-500 group-hover:scale-110 transition-transform"><i data-lucide="shopping-cart" class="w-5 h-5"></i></div>
                                        <div><p class="text-white font-black text-sm">Buka Kasir</p><p class="text-white/30 text-[10px] font-bold">Mulai transaksi baru</p></div>
                                    </a>
                                    <a href="inventory.html" class="flex items-center gap-4 p-4 rounded-2xl bg-white/5 hover:bg-white/10 transition-all border border-white/5 group">
                                        <div class="w-10 h-10 rounded-xl flex items-center justify-center bg-blue-500/20 text-blue-400 group-hover:scale-110 transition-transform"><i data-lucide="package" class="w-5 h-5"></i></div>
                                        <div><p class="text-white font-black text-sm">Stok Barang</p><p class="text-white/30 text-[10px] font-bold">Update persediaan</p></div>
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="js/app.js"></script>
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            if (!loadState()) {
                initProducts();
                saveState();
            }
            injectSidebar('dashboard');
            renderDashboard();
        });
    </script>
</body>
</html>
